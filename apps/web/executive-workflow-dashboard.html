<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CACSMS Engine | Workflow Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/executive-workflow-dashboard.css" />
    <link rel="stylesheet" href="/readability.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="CACSMS Engine home"><span class="brand-mark">C</span><span><strong>CACSMS</strong><small>ENGINE</small></span></a>
        <label class="global-search"><span class="icon">?</span><input type="search" placeholder="Search workflow cards, tests, evidence..." /></label>
        <div class="topbar-actions"><div class="workflow-pill"><span class="pulse"></span><strong>TEST HARNESS</strong><span>READY</span></div><div class="session"><small>REFERENCE FLOW</small><strong>14 CARDS</strong></div><button class="user-menu"><span>CA</span><i></i></button></div>
      </header>
      <aside class="sidebar">
        <div class="sidebar-heading">CONTROL SYSTEMS</div>
        <nav id="workflow-test-nav" aria-label="Primary navigation"></nav>
        <div class="sidebar-footer"><div class="operator"><span class="operator-dot"></span><div><small>LIVE VALIDATION</small><strong>CARD 1 ACTIVE</strong></div></div><button id="collapse-sidebar" class="collapse-button" aria-label="Collapse sidebar">&lt;</button></div>
      </aside>
      <main class="workspace card-test-workspace">
        <section id="card-one-dashboard"></section>
      </main>
      <footer class="statusbar"><div><span class="dot success"></span> API <strong>ONLINE</strong></div><div>CARD TESTING <strong>ENABLED</strong></div><div class="status-spacer"></div><div id="utc-clock">WAT</div></footer>
    </div>
    <script type="module" src="/real-time-status.js"></script>
    <script type="module" src="/executive-workflow-dashboard.js"></script>
  </body>
</html>
